<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <title>Horizon Classical</title>
  </head>

  <body>
    <h1>{{tournament_title}}</h1>

    <h3>Tournament Director CFC id: {{TD_cfc}}</h3>
    <h3>Tournament Organizer CFC id: {{TO_cfc}}</h3>

    <h3>Players:</h3>
    <ul>
      {% for player in players %}
      <li>{{player}}</li>
      {% endfor %}
    </ul>
  </body>
</html>
