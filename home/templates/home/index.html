{% extends "base.html" %} {% block page_title %} Horizon Report {% endblock %}
{% block content %}
<h1>Horizon Report</h1>
<h3>Available Reports:</h3>
<ul>
  {% for report in reports %}

  {% endfor %}
</ul>

<a href="{% url 'report-new' %}">Make Report</a>

{% endblock %}
